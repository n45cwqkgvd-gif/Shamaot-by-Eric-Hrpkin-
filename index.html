<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iShamay | מערכת שמאות פרימיום</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --apple-bg: #f5f5f7;
      --apple-card: rgba(255, 255, 255, 0.8);
      --apple-dark: #1d1d1f;
      --apple-blue: #0071e3;
      --apple-gray: #86868b;
      --apple-border: rgba(0,0,0,0.1);
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--apple-bg); 
      color: var(--apple-dark); 
      font-family: 'Assistant', -apple-system, sans-serif; 
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Glassmorphism Effect */
    .glass {
      background: var(--apple-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--apple-border);
      border-radius: var(--radius);
    }

    /* Apple-style Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #86868b; }

    @media print {
      .noprint { display: none !important; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Storage Logic ---
    const store = {
      get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      del(k) { try { localStorage.removeItem(k); } catch {} },
    };

    // --- Global Constants ---
    const VAT = 0.17;
    const LABOR_RATE = 180;
    const REPORT_TYPES = [
      { id: "repair", label: "תיקון", icon: "🔧", color: "#34C759" },
      { id: "de-facto", label: "אובדן להלכה", icon: "⚠️", color: "#FF9500" },
      { id: "total", label: "אובדן כללי", icon: "🚫", color: "#FF3B30" }
    ];

    const DAMAGE_ZONES = [
      { id:"front", label:"חזית" }, { id:"rear", label:"אחור" },
      { id:"right", label:"ימין" }, { id:"left", label:"שמאל" },
      { id:"roof", label:"גג" }, { id:"underbody", label:"גחון" }
    ];

    // --- UI Components ---
    const AppleButton = ({ children, onClick, variant="primary", style }) => {
      const variants = {
        primary: { background: "var(--apple-blue)", color: "#fff" },
        secondary: { background: "rgba(0,0,0,0.05)", color: "var(--apple-dark)" },
        danger: { background: "rgba(255,59,48,0.1)", color: "#FF3B30" }
      };
      return (
        <button onClick={onClick} style={{
          padding: "10px 20px",
          borderRadius: "20px",
          border: "none",
          fontWeight: "600",
          fontSize: "14px",
          cursor: "pointer",
          transition: "all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
          ...variants[variant],
          ...style
        }} onMouseEnter={e => e.target.style.opacity = "0.8"} 
           onMouseLeave={e => e.target.style.opacity = "1"}>
          {children}
        </button>
      );
    };

    const Card = ({ children, style, className }) => (
      <div className={`glass ${className}`} style={{ padding: "24px", marginBottom: "20px", ...style }}>
        {children}
      </div>
    );

    const InputField = ({ label, value, onChange, type="text" }) => (
      <div style={{ marginBottom: "16px" }}>
        <label style={{ display: "block", fontSize: "13px", fontWeight: "600", color: "var(--apple-gray)", marginBottom: "6px", marginRight: "4px" }}>{label}</label>
        <input type={type} value={value} onChange={e => onChange(e.target.value)} style={{
          width: "100%", padding: "12px 16px", borderRadius: "12px", border: "1px solid var(--apple-border)",
          fontSize: "15px", outline: "none", background: "#fff"
        }} />
      </div>
    );

    // --- Main App ---
    function App() {
      const [screen, setScreen] = useState("home");
      const [reports, setReports] = useState([]);
      const [form, setForm] = useState({ ownerName: "", carMake: "", carModel: "", licenseNum: "" });

      useEffect(() => {
        const saved = store.get("ishamy_reports") || [];
        setReports(saved);
      }, []);

      const saveNewReport = () => {
        const newList = [...reports, { ...form, id: Date.now() }];
        setReports(newList);
        store.set("ishamy_reports", newList);
        setScreen("home");
      };

      return (
        <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "40px 20px" }}>
          
          {/* Header */}
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "60px" }}>
            <div>
              <h1 style={{ fontSize: "34px", fontWeight: "700", letterSpacing: "-0.5px" }}>iShamay <span style={{ fontWeight: "300", color: "var(--apple-gray)" }}>Pro</span></h1>
              <p style={{ color: "var(--apple-gray)" }}>מערכת ניהול שמאות מתקדמת</p>
            </div>
            <AppleButton onClick={() => setScreen(screen === "home" ? "new" : "home")}>
              {screen === "home" ? "דו״ח חדש" : "ביטול"}
            </AppleButton>
          </header>

          {screen === "home" ? (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: "24px" }}>
              {reports.length === 0 ? (
                <div style={{ gridColumn: "1/-1", textAlign: "center", padding: "100px 0" }}>
                  <div style={{ fontSize: "48px", marginBottom: "20px" }}>📁</div>
                  <h2 style={{ color: "var(--apple-gray)" }}>אין דוחות זמינים. התחל ביצירת דוח חדש.</h2>
                </div>
              ) : reports.map(r => (
                <Card key={r.id} style={{ display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
                  <div>
                    <h3 style={{ fontSize: "20px", marginBottom: "8px" }}>{r.ownerName}</h3>
                    <p style={{ color: "var(--apple-gray)", fontSize: "14px" }}>{r.carMake} {r.carModel} | {r.licenseNum}</p>
                  </div>
                  <div style={{ marginTop: "20px", display: "flex", gap: "10px" }}>
                    <AppleButton variant="secondary" style={{ flex: 1 }}>הצג</AppleButton>
                    <AppleButton variant="danger" onClick={() => {
                        const filtered = reports.filter(item => item.id !== r.id);
                        setReports(filtered);
                        store.set("ishamy_reports", filtered);
                    }}>מחק</AppleButton>
                  </div>
                </Card>
              ))}
            </div>
          ) : (
            <div style={{ maxWidth: "800px", margin: "0 auto" }}>
              <Card>
                <h2 style={{ marginBottom: "24px" }}>פרטי הרכב והלקוח</h2>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>
                  <InputField label="שם הלקוח" value={form.ownerName} onChange={v => setForm({...form, ownerName: v})} />
                  <InputField label="מספר רישוי" value={form.licenseNum} onChange={v => setForm({...form, licenseNum: v})} />
                  <InputField label="יצרן" value={form.carMake} onChange={v => setForm({...form, carMake: v})} />
                  <InputField label="דגם" value={form.carModel} onChange={v => setForm({...form, carModel: v})} />
                </div>
                <div style={{ marginTop: "30px", textAlign: "left" }}>
                  <AppleButton onClick={saveNewReport} style={{ width: "100%", padding: "16px" }}>שמור והמשך לבחירת חלקים</AppleButton>
                </div>
              </Card>
            </div>
          )}
          
          <footer style={{ marginTop: "80px", textAlign: "center", color: "var(--apple-gray)", fontSize: "12px" }}>
            &copy; 2026 EHbuilt Automotive Solutions | Apple Style Dashboard
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
