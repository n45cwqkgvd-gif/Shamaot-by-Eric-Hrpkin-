<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iShamay PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .card { background: white; border-radius: 18px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 500px; margin: 20px auto; }
        h2 { text-align: center; color: var(--blue); font-weight: 800; margin-top: 0; }
        input { width: 100%; padding: 16px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 22px; text-align: center; font-weight: bold; outline: none; margin-bottom: 15px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; background: var(--blue); color: white; }
        .loader { display: none; text-align: center; margin: 15px 0; color: #666; }
        .result-box { display: none; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .res-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
        .val { font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <h2>iShamay PRO</h2>
    <input type="number" id="plateInput" placeholder="הכנס מספר רכב">
    <button id="fetchBtn">שליפת נתונים ישירה</button>
    <div id="loader" class="loader">מתחבר למאגר הממשלתי...</div>

    <div id="result" class="result-box">
        <div class="res-row"><span>דגם:</span> <span id="resModel" class="val"></span></div>
        <div class="res-row"><span>שנה:</span> <span id="resYear" class="val"></span></div>
        <div class="res-row"><span>שלדה:</span> <span id="resVin" class="val"></span></div>
        <div class="res-row"><span>צבע:</span> <span id="resColor" class="val"></span></div>
        <button onclick="window.print()" style="background:#34c759; margin-top:15px;">הדפסת דו"ח</button>
    </div>
</div>

<script>
    document.getElementById('fetchBtn').onclick = async () => {
        const plate = document.getElementById('plateInput').value.trim();
        if (plate.length < 5) return alert("מספר רכב לא תקין");

        const loader = document.getElementById('loader');
        const resBox = document.getElementById('result');
        loader.style.display = 'block';
        resBox.style.display = 'none';

        // שימוש ב-allOrigins רק כצינור להעברת הנתונים (Proxy)
        // אבל הפעם עם פילטר פשוט יותר
        const target = `https://data.gov.il/api/3/action/datastore_search?resource_id=053ad247-c90d-4343-8397-3e4b8d5a4560&q=${plate}`;
        
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data.success && data.result.records.length > 0) {
                const v = data.result.records[0];
                document.getElementById('resModel').innerText = v.tozeret_nm + " " + (v.kinuy_mishkari || "");
                document.getElementById('resYear').innerText = v.shnat_yitzur;
                document.getElementById('resVin').innerText = v.mispar_shila;
                document.getElementById('resColor').innerText = v.tzeva_rechev;
                resBox.style.display = 'block';
            } else {
                alert("הרכב לא נמצא במאגר");
            }
        } catch (e) {
            alert("שגיאה בחיבור למאגר. נסה שוב בעוד רגע.");
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
