<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iShamay PRO - מערכת שמאות מקצועית</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg); margin: 0; direction: rtl; }
        .header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 13px; font-weight: 700; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; background: #fafafa; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--blue); color: #fff; width: 100%; }
        .btn-search { background: #34c759; color: #fff; width: 60px; }
        .loader { width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media print {
            .noprint { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .p-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
            .p-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
            .p-table th, .p-table td { border: 1px solid #000; padding: 8px; text-align: right; font-size: 14px; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [shamaim, setShamaim] = useState(JSON.parse(localStorage.getItem('sh_prof')) || { name: '', lic: '', addr: '', tel: '' });
            const [reports, setReports] = useState(JSON.parse(localStorage.getItem('sh_reps')) || []);
            const [active, setActive] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => localStorage.setItem('sh_prof', JSON.stringify(shamaim)), [shamaim]);
            useEffect(() => localStorage.setItem('sh_reps', JSON.stringify(reports)), [reports]);

            const fetchCar = async (plate) => {
                if(!plate) return;
                setLoading(true);
                
                // מערך של ניסיונות חיבור - מהיר ליסודי
                const endpoints = [
                    // ניסיון 1: משרד התחבורה דרך AllOrigins
                    `https://api.allorigins.win/get?url=${encodeURIComponent(`https://data.gov.il/api/3/action/datastore_search?resource_id=053ad247-c90d-4343-8397-3e4b8d5a4560&filters={"mispar_rechev":"${plate}"}`)}`,
                    // ניסיון 2: משרד התחבורה דרך CorsProxy
                    `https://corsproxy.io/?${encodeURIComponent(`https://data.gov.il/api/3/action/datastore_search?resource_id=053ad247-c90d-4343-8397-3e4b8d5a4560&filters={"mispar_rechev":"${plate}"}`)}`
                ];

                let success = false;
                for (let url of endpoints) {
                    try {
                        const res = await fetch(url);
                        const data = await res.json();
                        const json = typeof data.contents === 'string' ? JSON.parse(data.contents) : data;
                        
                        if(json.result?.records?.[0]) {
                            const car = json.result.records[0];
                            setActive({...active, client: {
                                ...active.client,
                                plate,
                                model: `${car.tozeret_nm} ${car.kinuy_mishkari || ''}`,
                                year: car.shnat_yitzur
                            }});
                            success = true; break;
                        }
                    } catch (e) { continue; }
                }

                if(!success) alert("לא ניתן למשוך נתונים אוטומטית. אנא הזן דגם ידנית.");
                setLoading(false);
            };

            const totals = () => {
                if(!active) return { sub: 0, tax: 0, total: 0, pct: 0 };
                const pSum = active.parts.reduce((s, p) => s + (Number(p.p || 0) * (1 - (p.w || 0)/100)), 0);
                const sub = pSum + Number(active.labor || 0) + Number(active.paint || 0);
                return { sub, tax: sub * 0.17, total: sub * 1.17, pct: active.client.value > 0 ? (sub / active.client.value) * 100 : 0 };
            };

            return (
                <div>
                    <div className="header noprint">
                        <b onClick={()=>setView('home')} style={{cursor:'pointer'}}>iShamay <span style={{color:'var(--blue)'}}>PRO</span></b>
                        <button className="btn" onClick={()=>setView('config')}>⚙️ הגדרות</button>
                    </div>

                    <div className="container">
                        {view === 'config' && (
                            <div className="card">
                                <h3>פרטי שמאי קבועים</h3>
                                <div className="field"><label>שם השמאי</label><input value={shamaim.name} onChange={e=>setShamaim({...shamaim, name:e.target.value})} /></div>
                                <div className="field"><label>מספר רישיון</label><input value={shamaim.lic} onChange={e=>setShamaim({...shamaim, lic:e.target.value})} /></div>
                                <div className="field"><label>כתובת וטלפון</label><input value={shamaim.addr} onChange={e=>setShamaim({...shamaim, addr:e.target.value})} /></div>
                                <button className="btn btn-main" onClick={()=>setView('home')}>שמור</button>
                            </div>
                        )}

                        {view === 'home' && (
                            <div className="noprint">
                                <button className="btn btn-main" onClick={()=>{setActive({id:Date.now(), date:new Date().toLocaleDateString('he-IL'), client:{name:'', plate:'', model:'', year:'', value:0}, parts:[], labor:0, paint:0}); setView('edit');}}>+ שומה חדשה</button>
                                <div style={{marginTop:20}}>
                                    {reports.map(r => (
                                        <div key={r.id} className="card" onClick={()=>{setActive(r); setView('edit');}}>
                                            <b>{r.client.name || 'ללא שם'}</b><br/><small>{r.client.plate} | {r.client.model}</small>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'edit' && active && (
                            <div className="noprint">
                                <div className="card">
                                    <div className="field">
                                        <label>מספר רישוי</label>
                                        <div style={{display:'flex', gap:5}}>
                                            <input value={active.client.plate} onChange={e=>setActive({...active, client:{...active.client, plate:e.target.value}})} />
                                            <button className="btn btn-search" onClick={()=>fetchCar(active.client.plate)}>{loading ? <div className="loader"></div> : '🔍'}</button>
                                        </div>
                                    </div>
                                    <div className="field"><label>דגם רכב</label><input value={active.client.model} onChange={e=>setActive({...active, client:{...active.client, model:e.target.value}})} /></div>
                                    <div className="field"><label>ערך רכב (₪)</label><input type="number" value={active.client.value} onChange={e=>setActive({...active, client:{...active.client, value:e.target.value}})} /></div>
                                </div>
                                <button className="btn btn-main" onClick={()=>{setReports(prev=>[...prev.filter(x=>x.id!==active.id), active]); window.print();}}>הדפס דו"ח</button>
                            </div>
                        )}

                        {/* תצוגת הדפסה מקצועית */}
                        {active && (
                            <div className="print-only">
                                <div className="p-header">
                                    <h1>{shamaim.name || 'משרד שמאות'}</h1>
                                    <p>רישיון: {shamaim.lic} | {shamaim.addr}</p>
                                </div>
                                <h2 style={{textAlign:'center'}}>חוות דעת שומת נזק</h2>
                                <div style={{border:'1px solid #000', padding:10, marginBottom:20}}>
                                    <b>מספר רישוי:</b> {active.client.plate} | <b>דגם:</b> {active.client.model} | <b>אחוז נזק:</b> {totals().pct.toFixed(1)}%
                                </div>
                                <p><b>הצהרה משפטית:</b> אני נותן חוות דעתי זו במקום עדות בבית המשפט...</p>
                                <div style={{marginTop:50}}>________________<br/>חתימת השמאי</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
