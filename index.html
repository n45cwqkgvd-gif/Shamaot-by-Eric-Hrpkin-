<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iShamay PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #f2f2f7; margin: 0; padding: 15px; direction: rtl; }
        .card { background: white; max-width: 450px; margin: 10px auto; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h2 { color: #007aff; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 22px; text-align: center; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
        .result-box { display: none; margin-top: 20px; border-top: 2px solid #f2f2f7; padding-top: 15px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 17px; }
        .val { font-weight: 800; color: #000; }
        .loader { display: none; text-align: center; margin: 10px 0; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>iShamay PRO</h2>
    <input type="number" id="pIn" placeholder="הכנס מספר רכב">
    <button id="btn">חיפוש נתונים</button>
    <div id="ld" class="loader">מתחבר למאגר הממשלתי...</div>

    <div id="res" class="result-box">
        <div class="row"><span>יצרן:</span> <span id="rMake" class="val"></span></div>
        <div class="row"><span>דגם:</span> <span id="rModel" class="val"></span></div>
        <div class="row"><span>שנת ייצור:</span> <span id="rYear" class="val"></span></div>
        <div class="row"><span>מספר שלדה:</span> <span id="rVin" class="val"></span></div>
        <button onclick="window.print()" style="background:#34c759; margin-top:10px;">הדפסת דו"ח</button>
    </div>
</div>

<script>
    // פונקציית הקבלה של הנתונים
    function handleResponse(data) {
        document.getElementById('ld').style.display = 'none';
        if (data.success && data.result.records.length > 0) {
            const v = data.result.records[0];
            document.getElementById('rMake').innerText = v.tozeret_nm;
            document.getElementById('rModel').innerText = v.kinuy_mishkari || "כללי";
            document.getElementById('rYear').innerText = v.shnat_yitzur;
            document.getElementById('rVin').innerText = v.mispar_shila;
            document.getElementById('res').style.display = 'block';
        } else {
            alert("הרכב לא נמצא. וודא שהמספר תקין.");
        }
    }

    document.getElementById('btn').onclick = () => {
        const plate = document.getElementById('pIn').value.trim();
        if (plate.length < 5) return;

        document.getElementById('ld').style.display = 'block';
        document.getElementById('res').style.display = 'none';

        const old = document.getElementById('api');
        if (old) old.remove();

        const s = document.createElement('script');
        s.id = 'api';
        
        // ה-ID החדש והמעודכן (Resource ID) שאמור לעבוד עכשיו:
        const RID = "c8b9f9c8-4612-4068-934f-d4291121c68c"; 
        s.src = `https://data.gov.il/api/3/action/datastore_search?resource_id=${RID}&q=${plate}&callback=handleResponse`;
        
        document.body.appendChild(s);
    };
</script>

</body>
</html>
