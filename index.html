<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>שמאות רכב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f5f7;--sur:#fff;--sur2:#fbfbfd;
  --ink:#1d1d1f;--ink2:#424245;--ink3:#6e6e73;--ink4:#aeaeb2;
  --rule:rgba(0,0,0,.08);
  --green:#1d7a4a;--amber:#8a5a00;--red:#c0392b;--blue:#0071e3;
  --gold:#bf9b30;--gold2:#8b6914;
  --r:18px;--r-sm:12px;
  --sh:0 2px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  --sh-lg:0 8px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.05);
  --f:-apple-system,'Heebo',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;font-size:16px}
body{background:var(--bg);color:var(--ink);font-family:var(--f);direction:rtl;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
input,select,textarea,button{font-family:var(--f)}
::-webkit-scrollbar{width:0}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fu{animation:fu .5s cubic-bezier(.22,1,.36,1) both}
.fu1{animation-delay:.04s}.fu2{animation-delay:.09s}.fu3{animation-delay:.14s}.fu4{animation-delay:.19s}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:200;height:52px;
  background:rgba(245,245,247,.88);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.nav-brand{font-size:17px;font-weight:700;letter-spacing:-.02em}
.nav-acts{display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  height:34px;padding:0 16px;border-radius:980px;border:none;
  font-size:13px;font-weight:500;letter-spacing:-.01em;cursor:pointer;
  transition:all .2s cubic-bezier(.22,1,.36,1);white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.btn-p{background:var(--ink);color:#fff}
.btn-p:active{transform:scale(.97);opacity:.85}
.btn-s{background:rgba(0,0,0,.07);color:var(--ink)}
.btn-s:active{background:rgba(0,0,0,.12)}
.btn-g{background:var(--gold);color:#fff}
.btn-g:active{background:var(--gold2)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:active{opacity:.8}
.btn-x{background:transparent;border:none;color:var(--ink4);padding:0 8px}
.btn-x:active{color:var(--red)}
.btn-lg{height:44px;padding:0 22px;font-size:15px;border-radius:14px}
.btn-full{width:100%;height:48px;border-radius:14px;font-size:15px}
.btn[disabled]{opacity:.4;pointer-events:none}

/* ── CARDS ── */
.card{background:var(--sur);border-radius:var(--r);box-shadow:var(--sh)}
.card-sm{border-radius:var(--r-sm)}

/* ── HERO ── */
.hero{padding:56px 48px 40px}
.hero-eye{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.hero-h1{font-size:52px;font-weight:700;letter-spacing:-.04em;line-height:1.05;color:var(--ink);margin-bottom:18px}
.hero-sub{font-size:16px;font-weight:300;color:var(--ink3);line-height:1.65;max-width:480px}

/* ── TYPE GRID ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:0 48px 40px}
.tc{
  background:var(--sur);border-radius:var(--r);padding:26px 22px;
  cursor:pointer;box-shadow:var(--sh);
  border:2px solid transparent;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  -webkit-tap-highlight-color:transparent;
}
.tc:active{transform:scale(.98)}
.tc:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.tc.on{border-color:var(--ink);transform:translateY(-4px);box-shadow:var(--sh-lg)}
.tc.on .tc-n{color:#fff}
.tc.on .tc-d{color:rgba(255,255,255,.5)}
.tc.on{background:var(--ink)}
.tc-dot{width:10px;height:10px;border-radius:50%;margin-bottom:16px}
.tc-n{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}
.tc-d{font-size:12px;color:var(--ink3);line-height:1.5}
.tc-pct{font-size:26px;font-weight:700;letter-spacing:-.04em;margin-top:14px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:0 48px 32px}
.stat{background:var(--sur);border-radius:var(--r-sm);padding:18px 20px;box-shadow:var(--sh)}
.stat-v{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1}
.stat-l{font-size:11px;font-weight:400;color:var(--ink3);margin-top:5px;letter-spacing:.01em}

/* ── REPORT LIST ── */
.rlist{padding:0 48px 48px}
.rl-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.ri{
  background:var(--sur);border-radius:var(--r-sm);padding:16px 20px;
  margin-bottom:10px;box-shadow:var(--sh);
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  transition:all .2s;cursor:default;
}
.ri:active{transform:scale(.99)}
.ri-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ri-info{min-width:0}
.ri-name{font-size:14px;font-weight:600;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-meta{font-size:11px;color:var(--ink3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ri-amt{font-size:16px;font-weight:700;letter-spacing:-.03em}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:980px;font-size:10px;font-weight:600;letter-spacing:.01em}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-g{background:rgba(29,122,74,.1);color:var(--green)}
.badge-a{background:rgba(138,90,0,.1);color:var(--amber)}
.badge-r{background:rgba(192,57,43,.1);color:var(--red)}

/* ── ALERT ── */
.alert{padding:12px 16px;border-radius:var(--r-sm);font-size:13px}
.alert-gold{background:rgba(191,155,48,.1);color:var(--gold2);border:1px solid rgba(191,155,48,.25)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom)}
.modal{background:var(--sur);border-radius:20px 20px 0 0;padding:28px 24px 32px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:fu .3s cubic-bezier(.22,1,.36,1)}
.modal-h2{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--ink3);font-weight:300}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px}
.s2{grid-column:span 2}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.field input,.field select,.field textarea{
  background:rgba(0,0,0,.05);border:none;border-radius:10px;
  padding:11px 13px;font-size:15px;color:var(--ink);
  outline:none;transition:all .2s;direction:rtl;width:100%;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{background:rgba(0,0,0,.09);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.field textarea{resize:vertical;min-height:76px;line-height:1.6;font-size:14px}
.field select{cursor:pointer}
.field input[readonly]{background:rgba(191,155,48,.1);color:var(--gold);font-weight:600;cursor:default}

/* ── EDITOR ── */
.editor-wrap{display:flex;flex-direction:column;flex:1;min-height:0;background:var(--bg)}
.editor-top{
  position:sticky;top:52px;z-index:100;height:52px;
  background:rgba(245,245,247,.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;flex-shrink:0;
}
.editor-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.editor-cols{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 104px)}
.editor-form{padding:24px 28px;border-left:1px solid var(--rule)}
.editor-side{display:flex;flex-direction:column;background:var(--bg)}

/* ── TICKER ── */
.ticker{display:grid;grid-template-columns:repeat(4,1fr);background:var(--rule);gap:1px;flex-shrink:0}
.tick{background:var(--sur);padding:12px 16px}
.tick-v{font-size:15px;font-weight:700;letter-spacing:-.02em}
.tick-l{font-size:9px;font-weight:500;color:var(--ink3);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}

/* ── GAUGE ── */
.gauge{padding:12px 18px;background:var(--sur);flex-shrink:0}
.gauge-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.gauge-track{height:4px;background:var(--rule);border-radius:2px;position:relative;overflow:visible}
.gauge-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.gauge-mark{position:absolute;top:-5px;width:1px;height:14px;background:rgba(0,0,0,.15)}
.gauge-ticks{display:flex;justify-content:space-between;margin-top:4px}

/* ── TABS ── */
.tabs-bar{display:flex;background:var(--sur);border-bottom:1px solid var(--rule);flex-shrink:0}
.tab{flex:1;height:44px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--f);letter-spacing:.01em;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}

/* ── ZONE PILLS ── */
.zpills{display:flex;flex-wrap:wrap;gap:6px}
.zpill{padding:5px 12px;border-radius:980px;font-size:11px;font-weight:500;border:1.5px solid var(--rule);background:var(--sur);color:var(--ink3);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.zpill:active{transform:scale(.96)}
.zpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.zpill.hit{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.3);color:var(--red)}

/* ── PART ROWS ── */
.parts-box{border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh)}
.prow{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--sur);border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.prow:last-child{border-bottom:none}
.prow:active{background:rgba(0,0,0,.03)}
.prow.sel{background:rgba(29,122,74,.05)}
.pck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--rule);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pck.on{border-color:var(--ink);background:var(--ink)}
.pck.on::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.pn{flex:1;font-size:13px;color:var(--ink3)}
.prow.sel .pn{color:var(--ink);font-weight:500}
.pp{font-size:11px;color:var(--ink4);font-feature-settings:'tnum'}

/* ── SELECTED PART CARD ── */
.sp{background:var(--sur);border-radius:var(--r-sm);padding:14px;margin-bottom:8px;box-shadow:var(--sh)}
.sp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sp-name{font-size:13px;font-weight:600}
.sp-zone{font-size:10px;color:var(--ink3);background:rgba(0,0,0,.06);padding:3px 8px;border-radius:980px;font-weight:500}
.mg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4)}
.mf input,.mf select{background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:7px 9px;font-size:12px;color:var(--ink);outline:none;width:100%;font-family:var(--f)}

/* ── LOOKUP ── */
.lookup-box{background:rgba(0,113,227,.06);border:1px solid rgba(0,113,227,.18);border-radius:var(--r-sm);padding:16px;margin-bottom:18px}
.lookup-row{display:flex;gap:10px;align-items:flex-end}
.lookup-row .field{flex:1}
.lookup-state{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;font-weight:500}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEC ── */
.sec{margin-bottom:26px}
.sec-t{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--rule)}

/* ── LABOR ROW ── */
.labor-row{display:grid;grid-template-columns:2fr 1fr .65fr auto;gap:8px 10px;margin-bottom:10px;align-items:end}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:52px 20px;color:var(--ink3)}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:12px}
.empty-t{font-size:14px;font-weight:500;margin-bottom:6px}
.empty-s{font-size:12px;font-weight:300;line-height:1.6}

/* ═══════════════════════════
   TABLET  ≤ 1024px
═══════════════════════════ */
@media(max-width:1024px){
  .hero{padding:44px 28px 32px}
  .hero-h1{font-size:40px}
  .type-grid{padding:0 28px 32px;gap:12px}
  .stats{padding:0 28px 28px;gap:12px}
  .rlist{padding:0 28px 36px}
  .editor-cols{grid-template-columns:1fr}
  .editor-form{border-left:none;border-bottom:1px solid var(--rule);padding:20px 24px}
  .editor-side{min-height:60vh}
}

/* ═══════════════════════════
   MOBILE  ≤ 640px  (iPhone)
═══════════════════════════ */
@media(max-width:640px){
  /* NAV */
  .nav{padding:0 16px;height:50px}
  .nav-brand{font-size:16px}
  .nav-acts .btn{height:32px;padding:0 12px;font-size:12px}
  .nav-hide{display:none}

  /* HERO */
  .hero{padding:32px 20px 24px}
  .hero-eye{font-size:11px;margin-bottom:10px}
  .hero-h1{font-size:34px;letter-spacing:-.03em;margin-bottom:14px}
  .hero-sub{font-size:14px;max-width:100%}

  /* TYPE CARDS — horizontal strips */
  .type-grid{grid-template-columns:1fr;gap:10px;padding:0 16px 28px}
  .tc{padding:16px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px}
  .tc-dot{margin-bottom:0;width:12px;height:12px}
  .tc-n{font-size:16px;margin-bottom:2px}
  .tc-d{font-size:11px}
  .tc-pct{margin-top:0;font-size:22px;text-align:left}

  /* STATS */
  .stats{grid-template-columns:1fr 1fr 1fr;padding:0 16px 24px;gap:8px}
  .stat{padding:12px 10px}
  .stat-v{font-size:26px}
  .stat-l{font-size:9px}

  /* REPORT LIST */
  .rlist{padding:0 16px 32px}
  .ri{flex-direction:column;align-items:stretch;gap:10px;padding:14px}
  .ri-right{justify-content:space-between}
  .ri-name{font-size:15px}
  .ri-meta{white-space:normal;font-size:11px}

  /* EDITOR TOP BAR */
  .editor-top{height:auto;min-height:50px;padding:8px 14px;flex-wrap:wrap;top:50px}
  .editor-top-case{flex:1 0 100%;font-size:11px;color:var(--ink3);margin-bottom:4px}
  .editor-top-right{display:flex;align-items:center;gap:10px;flex:1}
  .editor-top-pct{flex:1}

  /* EDITOR FORM */
  .editor-cols{grid-template-columns:1fr}
  .editor-form{padding:16px}
  .editor-side{min-height:50vh}

  /* FORM GRID — single column */
  .form-grid{grid-template-columns:1fr !important;gap:12px}
  .s2{grid-column:span 1 !important}
  .field input,.field select,.field textarea{font-size:16px !important;padding:12px 13px}

  /* LABOR */
  .labor-row{grid-template-columns:1fr 1fr;gap:8px}
  .labor-row>div:nth-child(3){grid-column:span 1}
  .labor-row>div:nth-child(4){grid-column:span 2;display:flex;justify-content:flex-end}

  /* TICKER 2x2 */
  .ticker{grid-template-columns:1fr 1fr}
  .tick{padding:10px 14px}
  .tick-v{font-size:14px}

  /* GAUGE */
  .gauge{padding:10px 14px}

  /* TABS */
  .tab{font-size:12px;height:42px}

  /* CAR DIAGRAM — stack */
  .diag-wrap{flex-direction:column!important;align-items:center!important;gap:16px!important}
  .diag-right{width:100%}
  .zpills{justify-content:center}

  /* PART ROWS */
  .prow{padding:13px 14px}
  .pck{width:22px;height:22px}
  .pn{font-size:13px}

  /* SELECTED PARTS */
  .mg{grid-template-columns:1fr 1fr}
  .sp{padding:12px}

  /* LOOKUP */
  .lookup-row{flex-direction:column}
  .lookup-row .btn{width:100%;height:46px}

  /* MODAL — bottom sheet */
  .modal-bg{align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;padding:24px 18px 32px;max-height:90vh}

  /* BUTTONS */
  .btn{-webkit-tap-highlight-color:transparent}
  .btn-full{height:52px}
}

@media print{
  .noprint{display:none!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

/* STORAGE */
const S={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:k=>{try{localStorage.removeItem(k)}catch{}}
};
const saveProfile=p=>S.set('sh_p',p);
const loadProfile=()=>S.get('sh_p');
const saveReport=r=>{S.set('sh_r_'+r.id,r);const ids=S.get('sh_ids')||[];if(!ids.includes(r.id)){ids.unshift(r.id);S.set('sh_ids',ids)}};
const loadReports=()=>(S.get('sh_ids')||[]).map(id=>S.get('sh_r_'+id)).filter(Boolean);
const delReport=id=>{S.del('sh_r_'+id);S.set('sh_ids',(S.get('sh_ids')||[]).filter(x=>x!==id))};

const VAT=0.17,LR=180;
const TYPES=[
  {id:'repair', n:'לתיקון',    c:'#1d7a4a', bdg:'badge-g', d:'נזק עד 50%'},
  {id:'defacto',n:'אובדן להלכה',c:'#8a5a00',bdg:'badge-a',d:'50%–60% · נרשם ברישיון'},
  {id:'total',  n:'אובדן כללי', c:'#c0392b', bdg:'badge-r', d:'60%+ · טוטאל לוס'},
];
const ZONES=[
  {id:'front',l:'חזית'},{id:'front_right',l:'חזית ימין'},{id:'front_left',l:'חזית שמאל'},
  {id:'right',l:'צד ימין'},{id:'left',l:'צד שמאל'},{id:'rear',l:'אחור'},
  {id:'rear_right',l:'אחור ימין'},{id:'rear_left',l:'אחור שמאל'},
  {id:'roof',l:'גג'},{id:'engine',l:'תא מנוע'},{id:'underbody',l:'תחתית'},

const VEHICLE_DATASETS = [
  // Private & commercial vehicles (most common — currently active)
  '053cea08-09bc-40ec-8f7a-156f0677aff3',
  // Off-road (rare)
  '03adc637-b6fe-402b-9937-7c3d3afc9140',
  // Vehicles taken off road (older / scrapped)
  '6f6acd03-f351-4a8f-8ecf-df792f4f573a',
  // Motorcycles
  'cd3acc5a-b210-4af2-8a0e-3b40a3d8501c',
];

const CORS_PROXIES = [
  // Try direct first, then fall back to proxies
  '',
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
];

async function lookupVehicle(plateRaw) {
  if (!plateRaw) return null;
  // Clean plate: digits only
  const plate = String(plateRaw).replace(/[^0-9]/g, '');
  if (plate.length < 5) return { error: 'מספר רישוי לא תקין (פחות מ-5 ספרות)' };

  for (const datasetId of VEHICLE_DATASETS) {
    const apiUrl = `https://data.gov.il/api/3/action/datastore_search?resource_id=${datasetId}&q=${plate}&limit=5`;

    for (const proxy of CORS_PROXIES) {
      try {
        const url = proxy ? proxy + encodeURIComponent(apiUrl) : apiUrl;
        const response = await fetch(url, { signal: AbortSignal.timeout(7000) });
        if (!response.ok) continue;
        const data = await response.json();
        if (data?.result?.records?.length > 0) {
          // Find exact match if possible
          const records = data.result.records;
          let match = records.find(r => String(r.mispar_rechev || '') === plate);
          if (!match) match = records[0];
          return { data: match, datasetId };
        }
      } catch (e) {
        // try next proxy
        continue;
      }
    }
  }

  return { error: 'הרכב לא נמצא במאגר' };
}

function parseVehicleRecord(r) {
  if (!r) return {};
  return {
    licenseNum: r.mispar_rechev || '',
    carMake: r.tozeret_nm || r.tozeret_cd_nm || '',
    carModel: r.kinuy_mishari || r.degem_nm || r.kinuy_mishari_nm || '',
    carYear: String(r.shnat_yitzur || ''),
    vin: r.misgeret || '',
    color: r.tzeva_rechev || '',
    fuelType: r.sug_delek_nm || '',
    engineCC: r.nefah_manoa ? String(r.nefah_manoa) : '',
    gearbox: r.automatic_ind ? (String(r.automatic_ind)==='1' ? 'אוטומטי' : 'ידני') : '',
    licenseExpiry: r.tokef_dt || '',
    firstRegistration: r.moed_aliya_lakvish || '',
    ownership: r.baalut || '',
  };
}

/* ── LICENSE LOOKUP COMPONENT ── */
function LicenseLookup({onResult}){
  const[plate,setPlate]=useState('');
  const[state,setState]=useState('idle'); // idle | loading | success | error
  const[msg,setMsg]=useState('');

  async function doLookup(){
    if(!plate.trim()){setState('error');setMsg('נא להזין מספר רישוי');return}
    setState('loading');setMsg('מחפש במאגר משרד התחבורה...');
    try{
      const result=await lookupVehicle(plate);
      if(result?.data){
        const parsed=parseVehicleRecord(result.data);
        onResult(parsed);
        setState('success');
        setMsg(`✓ נמצא: ${parsed.carMake} ${parsed.carModel} ${parsed.carYear}`);
        setTimeout(()=>{setState('idle');setMsg('')},3500);
      }else{
        setState('error');
        setMsg(result?.error||'הרכב לא נמצא במאגר. ניתן למלא ידנית.');
      }
    }catch(e){
      setState('error');
      setMsg('שגיאת תקשורת. ניתן למלא ידנית.');
    }
  }

  return(
    <div className="lookup-box">
      <div style={{fontSize:11,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--blue)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
        <span style={{display:'inline-block',width:6,height:6,background:'var(--blue)',borderRadius:'50%'}}/>
        שליפת פרטי רכב אוטומטית · משרד התחבורה
      </div>
      <div className="lookup-row">
        <div className="field" style={{flex:1}}>
          <input value={plate} onChange={e=>setPlate(e.target.value)}
            placeholder="הזן מספר רישוי (ספרות בלבד, ללא מקפים)"
            onKeyDown={e=>e.key==='Enter'&&doLookup()}
            disabled={state==='loading'}/>
        </div>
        <button className="btn btn-blue" onClick={doLookup} disabled={state==='loading'} style={{height:42}}>
          {state==='loading'?'מחפש...':'שלוף פרטים'}
        </button>
      </div>
      {state!=='idle'&&(
        <div className="lookup-state" style={{color:state==='error'?'var(--red)':state==='success'?'var(--green)':'var(--ink3)'}}>
          {state==='loading'&&<div className="spinner"/>}
          <span>{msg}</span>
        </div>
      )}
    </div>
  );
}

function LicenseLookup({onResult}){
  const[plate,setPlate]=useState('');
  const[state,setState]=useState('idle');
  const[msg,setMsg]=useState('');
  async function doLookup(){
    if(!plate.trim()){setState('error');setMsg('נא להזין מספר רישוי');return}
    setState('loading');setMsg('מחפש במאגר משרד התחבורה...');
    try{
      const result=await lookupVehicle(plate);
      if(result?.data){
        const parsed=parseVehicleRecord(result.data);
        onResult(parsed);setState('success');
        setMsg('✓ נמצא: '+parsed.carMake+' '+parsed.carModel+' '+parsed.carYear);
        setTimeout(()=>{setState('idle');setMsg('')},3500);
      }else{setState('error');setMsg(result?.error||'לא נמצא. ניתן למלא ידנית.');}
    }catch{setState('error');setMsg('שגיאת תקשורת. מלא ידנית.');}
  }
  return(
    <div className="lookup-box">
      <div style={{fontSize:11,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--blue)',marginBottom:10}}>
        ⚡ שליפה אוטומטית · משרד התחבורה
      </div>
      <div className="lookup-row">
        <div className="field" style={{flex:1}}>
          <input value={plate} onChange={e=>setPlate(e.target.value)}
            placeholder="מספר רישוי (ספרות בלבד)"
            onKeyDown={e=>e.key==='Enter'&&doLookup()}
            disabled={state==='loading'}/>
        </div>
        <button className="btn btn-blue" onClick={doLookup} disabled={state==='loading'}>
          {state==='loading'?'מחפש...':'שלוף'}
        </button>
      </div>
      {state!=='idle'&&(
        <div className="lookup-state" style={{color:state==='error'?'var(--red)':state==='success'?'var(--green)':'var(--ink3)'}}>
          {state==='loading'&&<div className="spinner"/>}
          <span>{msg}</span>
        </div>
      )}
    </div>
  );
}

              ))}
              {paint>0&&<tr style={{background:'#fdfcf5'}}><td colSpan="5" style={td}>עבודות צביעה וחומרים</td><td style={{...td,textAlign:'center',fontWeight:600}}>{fmt(paint)}</td></tr>}
              {other>0&&<tr style={{background:'#fdfcf5'}}><td colSpan="5" style={td}>עלויות נוספות</td><td style={{...td,textAlign:'center',fontWeight:600}}>{fmt(other)}</td></tr>}

          </table>

          {/* Financial bottom line */}
          <div style={{display:'flex',justifyContent:'flex-start',marginTop:24}}>
            <table style={{width:'55%',marginRight:'auto'}}>
              <tbody>
                <tr><td style={{...td,fontWeight:600,background:'#f5f5f7'}}>סה"כ חלקים</td><td style={{...td,textAlign:'left',fontWeight:600}}>{fmt(tp)} ₪</td></tr>
                <tr><td style={{...td,fontWeight:600,background:'#f5f5f7'}}>סה"כ עבודות</td><td style={{...td,textAlign:'left',fontWeight:600}}>{fmt(tl)} ₪</td></tr>
                {paint>0&&<tr><td style={{...td,fontWeight:600,background:'#f5f5f7'}}>סה"כ צביעה</td><td style={{...td,textAlign:'left',fontWeight:600}}>{fmt(paint)} ₪</td></tr>}
                {other>0&&<tr><td style={{...td,fontWeight:600,background:'#f5f5f7'}}>עלויות נוספות</td><td style={{...td,textAlign:'left',fontWeight:600}}>{fmt(other)} ₪</td></tr>}
                <tr><td style={{...td,fontWeight:700,background:'#e8e8ec'}}>סה"כ נזק (ללא מע"מ)</td><td style={{...td,textAlign:'left',fontWeight:700}}>{fmt(sub)} ₪</td></tr>
                <tr><td style={{...td,fontWeight:600,background:'#f5f5f7'}}>מע"מ 17%</td><td style={{...td,textAlign:'left'}}>{fmt(vat)} ₪</td></tr>
                <tr style={{background:'#1d1d1f',color:'#fff'}}><td style={{...td,border:'1px solid #1d1d1f',color:'#fff',fontWeight:700,fontSize:13}}>סה"כ לתשלום (כולל מע"מ)</td><td style={{...td,border:'1px solid #1d1d1f',color:'#fff',textAlign:'left',fontWeight:700,fontSize:14}}>{fmt(total)} ₪</td></tr>
              </tbody>
            </table>
          </div>

          <p style={{marginTop:18,fontSize:11,color:'#666',lineHeight:1.7}}>
            בהתאם לתקנות התעבורה, אומדן נזק זה מהווה <strong style={{color:vCol}}>{pct.toFixed(2)}%</strong> מערך הרכב המשוערך.
          </p>

          <PageFooter pageNum={4} sectionName="אומדן הנזק"/>
        </div>

        {/* ═══ PAGE 5: ASSESSOR & LEGAL DECLARATION ═══ */}
        <div className="print-page" style={{width:'210mm',minHeight:'297mm',maxWidth:'100%',padding:'14mm 16mm',background:'#fff',position:'relative',boxShadow:'0 2px 20px rgba(0,0,0,.06)',margin:'0 auto 12mm',boxSizing:'border-box'}}>
          <PageHeader/>

          <div style={sectionTitle}>השכלת וניסיון השמאי</div>

          <div style={{padding:'16px 20px',background:'#fafafa',border:'1px solid #e5e5ea',borderRadius:10,marginBottom:24}}>

          <div style={sectionTitle}>הצהרה משפטית</div>

              אני נותן חוות דעתי זו במקום עדות בבית המשפט, והריני מצהיר בזה כי ידוע לי היטב, שלעניין הוראות החוק הפלילי בדבר עדות שקר בשבועה בבית המשפט, דין חוות דעתי זו, כאשר היא חתומה על ידי, כדין עדות בבית המשפט.

          {/* Attachments */}
          <div style={sectionTitle}>נספחים</div>

            <li>תחשיב ערך הרכב</li>
            {(R.reportType==='total')&&<li>טופס 587 — דיווח אובדן גמור למשרד הרישוי</li>}

            <li>חשבון שכר טרחה (במסמך נפרד)</li>

          {/* Signature block */}
          <div style={{marginTop:60,display:'flex',justifyContent:'space-between',paddingTop:30}}>

              <div style={{width:140,borderBottom:'1.5px solid #1d1d1f',paddingBottom:40,marginBottom:8}}/>

/* ══════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════ */

function App(){
  const[screen,setScreen]=useState('home');
  const[profile,setProfile]=useState(null);
  const[showProfile,setShowProfile]=useState(false);
  const[reports,setReports]=useState([]);
  const[printRep,setPrintRep]=useState(null);
  const[form,setFormState]=useState(emptyF());
  const[parts,setParts]=useState([]);
  const[labor,setLabor]=useState([{description:'',type:'bodywork',hours:'2'}]);
  const[zone,setZone]=useState('front');
  const[tab,setTab]=useState('diagram');
  const sf=useCallback((k,v)=>setFormState(p=>({...p,[k]:v})),[]);

  useEffect(()=>{setProfile(loadProfile());setReports(loadReports())},[]);
  useEffect(()=>{if(screen==='new'){sf('caseNumber',newCase());sf('inspectionDate',isoToday())}},[screen]);
  useEffect(()=>{
    const v=(Number(form.baseValue)||0)+(Number(form.kmAdj)||0)+(Number(form.ownersAdj)||0)+(Number(form.extras)||0);
    if(form.baseValue)sf('vehicleValue',v.toString());
  },[form.baseValue,form.kmAdj,form.ownersAdj,form.extras]);

  const tp=parts.reduce((s,p)=>s+(Number(p.price)||0),0);
  const tl=labor.reduce((s,l)=>s+(Number(l.hours)||0)*LR,0);
  const paint=Number(form.paintCost||0),other=Number(form.otherCost||0);
  const sub=tp+tl+paint+other,vat=sub*VAT,total=sub+vat;
  const vv=Number(form.vehicleValue||0);
  const pct=vv?(sub/vv*100):0;
  const suggested=pct>=60?'total':pct>=50?'defacto':'repair';
  const damaged=[...new Set(parts.map(p=>p.zone))];

  const togglePart=(part,z)=>{
    const idx=parts.findIndex(p=>p.name===part.n&&p.zone===z);
    if(idx>=0)setParts(prev=>prev.filter((_,i)=>i!==idx));
    else setParts(prev=>[...prev,{name:part.n,zone:z,price:part.p,action:"הח'",origin:'תחליפי',wear:''}]);
  };
  const updPart=(i,k,v)=>setParts(prev=>prev.map((p,j)=>j===i?{...p,[k]:v}:p));

  const onVehicleLookup=parsed=>{
    Object.entries(parsed).forEach(([k,v])=>{ if(v) sf(k,v); });
  };

  const doSave=()=>{
    if(!form.ownerName){alert('נא למלא שם בעל הרכב');return}
    const r={id:Date.now().toString(),createdAt:Date.now(),...form,parts,laborItems:labor};
    saveReport(r);setReports(loadReports());setScreen('home');
    setFormState(emptyF());setParts([]);setLabor([{description:'',type:'bodywork',hours:'2'}]);
  };
  const goHome=()=>{setScreen('home');setFormState(emptyF());setParts([]);setLabor([{description:'',type:'bodywork',hours:'2'}])};

  if(printRep)return <PrintView R={printRep} P={profile} onClose={()=>setPrintRep(null)}/>;

  /* ─ HOME ─ */
  if(screen==='home') return(
    <div>
      <nav className="nav">
        <div className="nav-brand">שמאות רכב</div>
        <div className="nav-acts">
          <button className="btn btn-s nav-hide" onClick={()=>setShowProfile(true)}>פרטי שמאי</button>
          <button className="btn btn-s" onClick={()=>setShowProfile(true)} title="פרטי שמאי">⚙</button>
          <button className="btn btn-s nav-hide" onClick={()=>setScreen('list')}>ארכיון ({reports.length})</button>
          <button className="btn btn-p" onClick={()=>setScreen('new')}>+ שומה חדשה</button>
        </div>
      </nav>

      <div className="hero fu fu1">
        <div className="hero-eye">מערכת חוות דעת מקצועית</div>
        <h1 className="hero-h1">שומת נזק רכב.</h1>
        <p className="hero-sub">לתיקון, אובדן להלכה ואובדן כללי — לפי תקנות משרד התחבורה. חישוב אוטומטי, הדפסה ב-5 עמודים.</p>
      </div>

      <div className="type-grid">
        {TYPES.map((t,i)=>(
          <div key={t.id} className={'tc fu fu-'+(i+1)} onClick={()=>{setScreen('new');setTimeout(()=>sf('reportType',t.id),50)}}>
            <div className="tc-dot" style={{background:t.c}}/>
            <div className="tc-body">
              <div className="tc-n">{t.n}</div>
              <div className="tc-d">{t.d}</div>
            </div>
            <div className="tc-pct" style={{color:t.c}}>{i===0?'<50%':i===1?'50–60%':'60%+'}</div>
          </div>
        ))}
      </div>

      <div className="stats fu fu4">
        {[['שומות שנוצרו',reports.length],['אובדן להלכה',reports.filter(r=>r.reportType==='defacto').length],['אובדן כללי',reports.filter(r=>r.reportType==='total').length]].map(([l,v])=>(
          <div key={l} className="stat"><div className="stat-v">{v}</div><div className="stat-l">{l}</div></div>
        ))}
      </div>

      {reports.length>0&&(
        <div className="rlist fu">
          <div className="rl-label">שומות אחרונות</div>
          {reports.slice(0,8).map(r=>{
            const rtp=(r.parts||[]).reduce((s,p)=>s+(Number(p.price)||0),0);
            const rtl=(r.laborItems||[]).reduce((s,l)=>s+(Number(l.hours)||0)*LR,0);
            const rtot=(rtp+rtl)*(1+VAT);
            const type=TYPES.find(t=>t.id===r.reportType);
            return(
              <div key={r.id} className="ri">
                <div className="ri-left">
                  <div className="ri-dot" style={{background:type?.c||'#aaa'}}/>
                  <div className="ri-info">
                    <div className="ri-name">{r.ownerName}</div>
                    <div className="ri-meta">{r.carMake} {r.carModel} {r.carYear} · {r.licenseNum} · {new Date(r.createdAt).toLocaleDateString('he-IL')}</div>
                  </div>
                </div>
                <div className="ri-right">
                  <div className="ri-amt">{fmt(rtot)} ₪</div>
                  <TBadge type={r.reportType}/>
                  <button className="btn btn-s" style={{height:30,padding:'0 12px',fontSize:12}} onClick={()=>setPrintRep(r)}>הדפסה</button>
                  <button className="btn btn-x" onClick={()=>{if(confirm('למחוק?')){delReport(r.id);setReports(loadReports())}}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {reports.length>0&&(
        <div style={{padding:'0 48px 16px'}}>
          <button className="btn btn-s" onClick={()=>setScreen('list')} style={{fontSize:13}}>ראה את כל {reports.length} השומות →</button>
        </div>
      )}

      {!profile&&(
        <div style={{padding:'0 48px 40px'}}>
          <div className="alert alert-gold">⚠ טרם הגדרת פרטי שמאי — <span style={{textDecoration:'underline',cursor:'pointer',fontWeight:600}} onClick={()=>setShowProfile(true)}>הגדר עכשיו</span></div>
        </div>
      )}
      {showProfile&&<ProfileModal profile={profile} onSave={p=>{setProfile(p);saveProfile(p);setShowProfile(false)}} onClose={()=>setShowProfile(false)}/>}
    </div>
  );

  /* ─ LIST ─ */
  if(screen==='list') return(
    <div>
      <nav className="nav">
        <div className="nav-brand">ארכיון</div>
        <button className="btn btn-s" onClick={()=>setScreen('home')}>← חזרה</button>
      </nav>
      <div className="rlist" style={{paddingTop:28}}>
        {reports.length===0&&<p style={{color:'var(--ink3)',fontSize:14,fontWeight:300}}>אין שומות שמורות.</p>}
        {reports.map(r=>{
          const rtp=(r.parts||[]).reduce((s,p)=>s+(Number(p.price)||0),0);
          const rtl=(r.laborItems||[]).reduce((s,l)=>s+(Number(l.hours)||0)*LR,0);
          const rtot=(rtp+rtl)*(1+VAT);
          return(
            <div key={r.id} className="ri">
              <div className="ri-left">
                <div className="ri-info">
                  <div className="ri-name">{r.ownerName}</div>
                  <div className="ri-meta">{r.carMake} {r.carModel} · {r.licenseNum} · תיק {r.caseNumber}</div>
                </div>
              </div>
              <div className="ri-right">
                <div className="ri-amt">{fmt(rtot)} ₪</div>
                <TBadge type={r.reportType}/>
                <button className="btn btn-g" style={{height:32,padding:'0 14px',fontSize:12}} onClick={()=>setPrintRep(r)}>הדפסה</button>
                <button className="btn btn-x" onClick={()=>{if(confirm('למחוק?')){delReport(r.id);setReports(loadReports())}}}>✕</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  /* ─ EDITOR ─ */
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* TOP BAR */}
      <div className="editor-top">
        <div className="editor-top-case">
          <button className="btn btn-s" style={{height:28,padding:'0 10px',fontSize:11,marginLeft:8}} onClick={goHome}>←</button>
          <span style={{fontSize:12,color:'var(--ink3)'}}>תיק <strong style={{color:'var(--ink)'}}>{form.caseNumber}</strong></span>
        </div>
        <div className="editor-top-right">
          {pct>0&&(
            <div className="editor-top-pct" style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:4,background:'rgba(0,0,0,.08)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',width:Math.min(pct,100)+'%',background:pct>=60?'var(--red)':pct>=50?'var(--amber)':'var(--green)',transition:'width .5s'}}/>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:pct>=60?'var(--red)':pct>=50?'var(--amber)':'var(--green)',whiteSpace:'nowrap'}}>{pct.toFixed(1)}%</span>
            </div>
          )}
          <span style={{fontSize:17,fontWeight:700,letterSpacing:'-.02em',whiteSpace:'nowrap'}}>{fmt(total)} ₪</span>
          <button className="btn btn-g" style={{height:34,padding:'0 16px',fontSize:13}} onClick={doSave}>שמור</button>
        </div>
      </div>

      <div className="editor-wrap">
        <div className="editor-cols">

          {/* ── FORM (LEFT ON DESKTOP, TOP ON MOBILE) ── */}
          <div className="editor-form" style={{overflowY:'auto'}}>

            <div className="sec">
              <div className="sec-t">סוג חוות הדעת</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
                {TYPES.map(t=>(
                  <div key={t.id} className={'tc'+(form.reportType===t.id?' on':'')} onClick={()=>sf('reportType',t.id)} style={{padding:'12px',borderRadius:10}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:t.c,marginBottom:7}}/>
                    <div style={{fontSize:12,fontWeight:700,color:form.reportType===t.id?'#fff':'var(--ink)',marginBottom:3}}>{t.n}</div>
                    <div style={{fontSize:10,color:form.reportType===t.id?'rgba(255,255,255,.5)':'var(--ink4)',lineHeight:1.4}}>{t.d}</div>
                  </div>
                ))}
              </div>
              {pct>0&&suggested!==form.reportType&&(
                <div className="alert" style={{background:'rgba(0,0,0,.04)',border:'1px solid var(--rule)',fontSize:12,color:'var(--ink2)'}}>
                  💡 לפי החישוב ({pct.toFixed(1)}%) מוצע: <strong>{TYPES.find(t=>t.id===suggested)?.n}</strong>
                </div>
              )}
            </div>

            <div className="sec">
              <div className="sec-t">פרטי הרכב</div>
              <LicenseLookup onResult={onVehicleLookup}/>
              <div className="form-grid">
                <F label="שם בעל הרכב" value={form.ownerName} onChange={v=>sf('ownerName',v)}/>
                <F label="מספר רישוי" value={form.licenseNum} onChange={v=>sf('licenseNum',v)}/>
                <F label="יצרן" value={form.carMake} onChange={v=>sf('carMake',v)}/>
                <F label="דגם" value={form.carModel} onChange={v=>sf('carModel',v)}/>
                <F label="שנת ייצור" value={form.carYear} onChange={v=>sf('carYear',v)}/>
                <F label="מספר שילדה (VIN)" value={form.vin} onChange={v=>sf('vin',v)}/>
                <F label="קילומטרים" value={form.km} onChange={v=>sf('km',v)} type="number"/>
                <F label="מספר בעלים" value={form.owners} onChange={v=>sf('owners',v)} type="number"/>
                <F label="צבע" value={form.color} onChange={v=>sf('color',v)}/>
                <F label="סוג דלק" value={form.fuelType} onChange={v=>sf('fuelType',v)} options={['','בנזין','דיזל','חשמלי','היברידי','גז','אחר']}/>
                <F label='נפח מנוע (סמ"ק)' value={form.engineCC} onChange={v=>sf('engineCC',v)} type="number"/>
                <F label="סוג גיר" value={form.gearbox} onChange={v=>sf('gearbox',v)} options={['','אוטומטי','ידני','רובוטי']}/>
                <F label="תאריך עלייה לכביש" value={form.firstRegistration} onChange={v=>sf('firstRegistration',v)} type="date"/>
                <F label="תוקף רישיון" value={form.licenseExpiry} onChange={v=>sf('licenseExpiry',v)} type="date"/>
                <F label="בעלות נוכחית" value={form.ownership} onChange={v=>sf('ownership',v)} options={['','פרטי','חברה','השכרה','ליסינג','אחר']} span={2}/>
              </div>
            </div>

            <div className="sec">
              <div className="sec-t">פרטי התיק</div>
              <div className="form-grid">
                <F label="מספר תיק" value={form.caseNumber} onChange={v=>sf('caseNumber',v)}/>
                <F label="סוג נזק" value={form.damageType} onChange={v=>sf('damageType',v)} options={['תאונה','גניבה','שיטפון','שריפה','ברד','וונדליזם','אחר']}/>
                <F label="תאריך אירוע" value={form.incidentDate} onChange={v=>sf('incidentDate',v)} type="date"/>
                <F label="תאריך בדיקה" value={form.inspectionDate} onChange={v=>sf('inspectionDate',v)} type="date"/>
                <F label="מוסך / מקום בדיקה" value={form.garage} onChange={v=>sf('garage',v)} span={2}/>
              </div>
            </div>

            <div className="sec">
              <div className="sec-t">פרטי ביטוח</div>
              <div className="form-grid">
                <F label="חברת ביטוח" value={form.insurance} onChange={v=>sf('insurance',v)}/>
                <F label="מספר פוליסה" value={form.policyNum} onChange={v=>sf('policyNum',v)}/>
                <F label="מספר תביעה" value={form.claimNum} onChange={v=>sf('claimNum',v)} span={2}/>
              </div>
            </div>

            <div className="sec">
              <div className="sec-t">תחשיב ערך הרכב</div>
              <div className="form-grid">
                <F label="ערך בסיס לפי מחירון ₪" value={form.baseValue} onChange={v=>sf('baseValue',v)} type="number"/>
                <F label='הפחתה/תוספת ק"מ ₪' value={form.kmAdj} onChange={v=>sf('kmAdj',v)} type="number"/>
                <F label="הפחתה/תוספת בעלויות ₪" value={form.ownersAdj} onChange={v=>sf('ownersAdj',v)} type="number"/>
                <F label="תוספות ואביזרים ₪" value={form.extras} onChange={v=>sf('extras',v)} type="number"/>
                <F label="ערך רכב משוערך ₪" value={fmt(form.vehicleValue)} onChange={()=>{}} readOnly/>
                {(form.reportType==='defacto'||form.reportType==='total')&&<F label="ערך שרידים ₪" value={form.salvageValue} onChange={v=>sf('salvageValue',v)} type="number"/>}
              </div>
            </div>

            <div className="sec">
              <div className="sec-t">תיאורים</div>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <TA label="תיאור המקרה" value={form.incidentDesc} onChange={v=>sf('incidentDesc',v)}/>
                <TA label="תיאור הנזקים" value={form.description} onChange={v=>sf('description',v)}/>
                <TA label="הערות מקצועיות" value={form.notes} onChange={v=>sf('notes',v)} rows={2}/>
              </div>
            </div>

            <div className="sec">
              <div className="sec-t">עבודות · {LR} ₪/ש"ע</div>
              {labor.map((l,i)=>(
                <div key={i} className="labor-row">
                  <div className="field">
                    {i===0&&<label>תיאור עבודה</label>}
                    <input value={l.description} onChange={e=>setLabor(prev=>prev.map((x,j)=>j===i?{...x,description:e.target.value}:x))} placeholder="לדוגמה: פחחות חזית"/>
                  </div>
                  <div className="field">
                    {i===0&&<label>סוג</label>}
                    <select value={l.type} onChange={e=>setLabor(prev=>prev.map((x,j)=>j===i?{...x,type:e.target.value}:x))}>
                      {LTYPES.map(lt=><option key={lt.id} value={lt.id}>{lt.l}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    {i===0&&<label>ש"ע</label>}
                    <input type="number" value={l.hours} onChange={e=>setLabor(prev=>prev.map((x,j)=>j===i?{...x,hours:e.target.value}:x))}/>
                  </div>
                  <button onClick={()=>setLabor(prev=>prev.filter((_,j)=>j!==i))} style={{background:'rgba(0,0,0,.06)',border:'none',borderRadius:8,cursor:'pointer',color:'var(--ink3)',fontSize:16,padding:'0 10px',height:42,marginTop:i===0?22:0}}>×</button>
                </div>
              ))}
              <button className="btn btn-s" style={{height:36,padding:'0 14px',fontSize:12,marginTop:4}} onClick={()=>setLabor(prev=>[...prev,{description:'',type:'bodywork',hours:'1'}])}>+ הוסף עבודה</button>
            </div>

            <div className="sec">
              <div className="sec-t">צביעה ועלויות נוספות</div>
              <div className="form-grid">
                <F label="עלות צביעה ₪" value={form.paintCost} onChange={v=>sf('paintCost',v)} type="number"/>
                <F label="עלויות נוספות ₪" value={form.otherCost} onChange={v=>sf('otherCost',v)} type="number"/>
              </div>
            </div>
          </div>

          {/* ── RIGHT PANEL (DIAGRAM + PARTS) ── */}
          <div className="editor-side">
            {/* TICKER */}
            <div className="ticker">
              {[['חלקים',tp],['עבודות',tl],['צביעה',paint],['סה"כ + מע"מ',total]].map(([l,v])=>(
                <div key={l} className="tick"><div className="tick-v">{fmt(v)} <span style={{fontSize:10,color:'var(--ink3)'}}>₪</span></div><div className="tick-l">{l}</div></div>
              ))}
            </div>
            <Gauge pct={pct}/>

            {/* TABS */}
            <div className="tabs-bar">
              {[['diagram','סכמת הרכב'],['parts','חלקים ('+parts.length+')']].map(([k,l])=>(
                <button key={k} className={'tab'+(tab===k?' on':'')} onClick={()=>setTab(k)}>{l}</button>
              ))}
            </div>

            {/* DIAGRAM TAB */}
            {tab==='diagram'&&(
              <div style={{padding:'20px',overflowY:'auto',flex:1}}>
                <div className="diag-wrap" style={{display:'flex',gap:18,alignItems:'flex-start',marginBottom:20}}>
                  <CarSVG active={zone} onZone={setZone} damaged={damaged}/>
                  <div className="diag-right" style={{flex:1}}>
                    <div style={{fontSize:10,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink3)',marginBottom:10}}>בחר מוקד פגיעה</div>
                    <div className="zpills">
                      {ZONES.map(z=>{
                        const cnt=parts.filter(p=>p.zone===z.id).length;
                        return<button key={z.id} className={'zpill'+(zone===z.id?' on':damaged.includes(z.id)?' hit':'')} onClick={()=>setZone(z.id)}>{z.l}{cnt>0?' · '+cnt:''}</button>;
                      })}
                    </div>
                  </div>
                </div>
                <div style={{height:1,background:'linear-gradient(90deg,transparent,rgba(191,155,48,.4),transparent)',margin:'14px 0 16px'}}/>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--gold)',marginBottom:12}}>
                  {ZONES.find(z=>z.id===zone)?.l}
                </div>
                <div className="parts-box">
                  {(PDB[zone]||[]).map((part,i)=>{
                    const sel=parts.find(p=>p.name===part.n&&p.zone===zone);
                    return(
                      <div key={i} className={'prow'+(sel?' sel':'')} onClick={()=>togglePart(part,zone)}>
                        <div className={'pck'+(sel?' on':'')}/>
                        <span className="pn">{part.n}</span>
                        <span className="pp">{fmt(part.p)} ₪</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* PARTS TAB */}
            {tab==='parts'&&(
              <div style={{padding:'20px',flex:1,overflowY:'auto'}}>
                {parts.length===0?(
                  <div className="empty">
                    <div className="empty-icon">◯</div>
                    <div className="empty-t">לא נבחרו חלקים</div>
                    <div className="empty-s">עבור לטאב "סכמת הרכב"<br/>ובחר חלקים פגועים</div>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--ink3)',marginBottom:14}}>חלקים שנבחרו · {parts.length}</div>
                    {parts.map((p,i)=>(
                      <div key={i} className="sp">
                        <div className="sp-top">
                          <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
                            <span className="sp-name">{p.name}</span>
                            <span className="sp-zone">{ZONES.find(z=>z.id===p.zone)?.l}</span>
                          </div>
                          <button onClick={()=>setParts(prev=>prev.filter((_,j)=>j!==i))} style={{background:'rgba(0,0,0,.07)',border:'none',width:24,height:24,borderRadius:'50%',cursor:'pointer',color:'var(--ink3)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>×</button>
                        </div>
                        <div className="mg">
                          {[['פעולה',["הח'","תק'","פו'"],'action'],['מקוריות',['תחליפי','מקורי','משומש','תואם'],'origin']].map(([label,opts,key])=>(
                            <div key={key} className="mf">
                              <label>{label}</label>
                              <select value={p[key]} onChange={e=>updPart(i,key,e.target.value)}>
                                {opts.map(o=><option key={o}>{o}</option>)}
                              </select>
                            </div>
                          ))}
                          <div className="mf"><label>בלאי %</label><input type="number" value={p.wear||''} placeholder="0" onChange={e=>updPart(i,'wear',e.target.value)}/></div>
                          <div className="mf"><label>מחיר ₪</label><input type="number" value={p.price} onChange={e=>updPart(i,'price',Number(e.target.value))} style={{background:'rgba(191,155,48,.12)',color:'var(--gold)',fontWeight:700}}/></div>
                        </div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
