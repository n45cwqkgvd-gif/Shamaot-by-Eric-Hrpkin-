    // ════════════════════════════════════════════════════════
    //  LOCAL STORAGE (GitHub Pages — no window.storage)
    // ════════════════════════════════════════════════════════
    const store = {
      get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      del(k) { try { localStorage.removeItem(k); } catch {} },
    };

    function saveProfile(p) { store.set("shamay_profile", p); }
    function loadProfile() { return store.get("shamay_profile"); }

    function saveReport(r) {
      store.set(`shamay_rep_${r.id}`, r);
      const ids = store.get("shamay_ids") || [];
      if (!ids.includes(r.id)) { ids.unshift(r.id); store.set("shamay_ids", ids); }
    }
    function loadReports() {
      const ids = store.get("shamay_ids") || [];
      return ids.map(id => store.get(`shamay_rep_${id}`)).filter(Boolean);
    }
    function deleteReport(id) {
      store.del(`shamay_rep_${id}`);
      const ids = (store.get("shamay_ids") || []).filter(x => x !== id);
      store.set("shamay_ids", ids);
    }

    // ════════════════════════════════════════════════════════
    //  UI PRIMITIVES
    // ════════════════════════════════════════════════════════
    function Divider({ gold=false }) {
      return (
        <div style={{display:"flex",alignItems:"center",gap:12,margin:"20px 0"}}>
          <div style={{flex:1,height:1,background:gold?C.gold:C.border}}/>
          {gold && <div style={{width:4,height:4,background:C.gold,transform:"rotate(45deg)"}}/>}
          {gold && <div style={{flex:1,height:1,background:C.gold}}/>}
        </div>
      );
    }

    function Badge({type}) {
      const t = REPORT_TYPES.find(r=>r.id===type);
      if (!t) return null;
      return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",fontFamily:T.sans,background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}44`}}>{t.icon} {t.label}</span>;
    }

    function DamageGauge({percent}) {
      const p = Number(percent)||0;
      const color = p>=60?"#dc2626":p>=50?"#d97706":p>=30?"#ca8a04":"#16a34a";
      const label = p>=60?"אובדן כללי":p>=50?"אובדן להלכה":p>0?"לתיקון":"—";
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:C.textSub,fontSize:11,fontFamily:T.sans}}>אחוז נזק גולמי</span>
            <span style={{color,fontSize:12,fontWeight:700,fontFamily:T.sans}}>{p.toFixed(1)}% — {label}</span>
          </div>
          <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(p,100)}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
            {[0,50,60,100].map(m=><span key={m} style={{fontSize:9,color:C.textMuted,fontFamily:T.sans}}>{m}%</span>)}
          </div>
        </div>
      );
    }

    function Inp({label,value,onChange,type="text",span=1,options,readOnly,note}) {
      const base = {width:"100%",padding:"9px 11px",background:readOnly?"#0d0d0d":C.card,color:readOnly?C.gold:C.text,border:`1px solid ${C.border}`,fontSize:13,fontFamily:T.sans,direction:"rtl",outline:"none"};
      return (
        <div style={{gridColumn:`span ${span}`}}>
          <label style={{display:"block",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.textMuted,marginBottom:5,fontFamily:T.sans}}>{label}</label>
          {options
            ? <select value={value} onChange={e=>onChange(e.target.value)} style={{...base,cursor:"pointer"}}>{options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}</select>
            : <input type={type} value={value} onChange={e=>onChange(e.target.value)} readOnly={readOnly} style={base}
                onFocus={e=>{if(!readOnly)e.target.style.borderColor=C.borderHi;}}
                onBlur={e=>e.target.style.borderColor=C.border} />
          }
          {note && <p style={{margin:"3px 0 0",fontSize:10,color:C.textMuted,fontFamily:T.sans}}>{note}</p>}
        </div>
      );
    }

    function TA({label,value,onChange,rows=3}) {
      return (
        <div>
          <label style={{display:"block",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.textMuted,marginBottom:5,fontFamily:T.sans}}>{label}</label>
          <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)}
            style={{width:"100%",padding:"9px 11px",background:C.card,color:C.text,border:`1px solid ${C.border}`,fontSize:13,fontFamily:T.sans,direction:"rtl",resize:"vertical",outline:"none"}}/>
        </div>
      );
    }

    function SecHead({title,sub}) {
      return (
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:2,height:16,background:C.gold}}/>
            <h3 style={{margin:0,fontSize:10,letterSpacing:2,textTransform:"uppercase",color:C.textSub,fontFamily:T.sans,fontWeight:600}}>{title}</h3>
          </div>
          {sub && <p style={{margin:"3px 0 0 12px",fontSize:11,color:C.textMuted,fontFamily:T.sans}}>{sub}</p>}
        </div>
      );
    }

    function Btn({children,onClick,variant="primary",small}) {
      const S={primary:{background:C.white,color:"#000",border:"none"},secondary:{background:"transparent",color:C.textSub,border:`1px solid ${C.border}`},danger:{background:"transparent",color:"#dc2626",border:"1px solid #dc262644"},gold:{background:C.gold,color:"#000",border:"none"}};
      return (
        <button onClick={onClick} style={{...S[variant],padding:small?"5px 13px":"9px 20px",cursor:"pointer",fontSize:small?11:13,fontFamily:T.sans,fontWeight:600,letterSpacing:0.5,transition:"opacity 0.15s",whiteSpace:"nowrap"}}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.75"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>{children}</button>
      );
    }

        {id:"rear_left",pts:"165,285 145,265 145,305 165,316",lx:152,ly:293},
        {id:"roof",pts:"165,75 295,75 295,285 165,285",lx:230,ly:180},

      return (
        <div style={{textAlign:"center",flexShrink:0}}>

                <g key={z.id} onClick={()=>onZone(z.id)} style={{cursor:"pointer"}}>

                    fill={active?"rgba(201,168,76,0.35)":hit?"rgba(220,38,38,0.25)":"rgba(255,255,255,0.04)"}
                    stroke={active?C.gold:hit?"#dc2626":"#2a2a2a"}

                  <text x={z.lx} y={z.ly} textAnchor="middle" dominantBaseline="middle"
                    fill={active?C.gold:hit?"#f87171":"#444"} fontSize="7"
                    fontFamily={T.sans} fontWeight={active?700:400} pointerEvents="none">
                    {DAMAGE_ZONES.find(dz=>dz.id===z.id)?.label}

    //  PROFILE MODAL
    // ════════════════════════════════════════════════════════

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}>

    const emptyForm = () => ({
      caseNumber:"",reportType:"repair",ownerName:"",licenseNum:"",carMake:"",carModel:"",
      carYear:"",vin:"",km:"",owners:"1",insurance:"",policyNum:"",claimNum:"",
      incidentDate:"",inspectionDate:"",garage:"",damageType:"תאונה",
      incidentDesc:"",description:"",notes:"",
      baseValue:"",kmAdj:"0",ownersAdj:"0",extras:"0",vehicleValue:"",
      paintCost:"",otherCost:"",salvageValue:"",
    });

    function App() {
      const [screen,setScreen] = useState("home");
      const [profile,setProfile] = useState(null);
      const [showProfile,setShowProfile] = useState(false);
      const [reports,setReports] = useState([]);
      const [printRep,setPrintRep] = useState(null);
      const [form,setFormState] = useState(emptyForm());
      const [parts,setParts] = useState([]);
      const [laborItems,setLaborItems] = useState([{description:"",type:"bodywork",zone:"",hours:"2"}]);
      const [activeZone,setActiveZone] = useState("front");
      const [tabRight,setTabRight] = useState("diagram");

      const setF = (k,v) => setFormState(p=>({...p,[k]:v}));

      useEffect(()=>{
        setProfile(loadProfile());
        setReports(loadReports());
      },[]);

      useEffect(()=>{
        if(screen==="new"){
          const d=new Date();
          setF("caseNumber",`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${Math.floor(Math.random()*9000+1000)}`);
          setF("inspectionDate",d.toISOString().slice(0,10));
        }
      },[screen]);

      useEffect(()=>{
        const v=(Number(form.baseValue)||0)+(Number(form.kmAdj)||0)+(Number(form.ownersAdj)||0)+(Number(form.extras)||0);
        if(form.baseValue) setF("vehicleValue",v.toString());
      },[form.baseValue,form.kmAdj,form.ownersAdj,form.extras]);

      const totalParts=parts.reduce((s,p)=>s+(Number(p.price)||0),0);
      const totalLabor=laborItems.reduce((s,l)=>s+(Number(l.hours)||0)*LABOR_RATE,0);
      const paint=Number(form.paintCost||0), other=Number(form.otherCost||0);
      const sub=totalParts+totalLabor+paint+other;
      const vat=sub*VAT, total=sub+vat;
      const vv=Number(form.vehicleValue||0);
      const dmgPct=vv?(sub/vv*100):0;
      const suggestedType=dmgPct>=60?"total":dmgPct>=50?"de-facto":"repair";
      const damaged=[...new Set(parts.map(p=>p.zone))];

      function togglePart(part,zone){
        const idx=parts.findIndex(p=>p.name===part.n&&p.zone===zone);
        if(idx>=0) setParts(prev=>prev.filter((_,i)=>i!==idx));
        else setParts(prev=>[...prev,{name:part.n,zone,price:part.p,laborH:part.h,action:"הח'",origin:"תחליפי",wear:""}]);
      }
      function updatePart(idx,k,v){setParts(prev=>prev.map((p,i)=>i===idx?{...p,[k]:v}:p));}

      function doSave(){
        if(!form.ownerName){alert("נא למלא שם בעל הרכב");return;}
        const r={id:Date.now().toString(),createdAt:Date.now(),...form,parts,laborItems};
        saveReport(r);
        setReports(loadReports());
        setScreen("home");
        setFormState(emptyForm());
        setParts([]);
        setLaborItems([{description:"",type:"bodywork",zone:"",hours:"2"}]);
      }

      if(printRep) return <PrintView report={printRep} profile={profile} onClose={()=>setPrintRep(null)}/>;

      // ── HOME ─────────────────────────────────────────────
      if(screen==="home") return (
        <div dir="rtl" style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:T.sans}}>
          <nav style={{borderBottom:`1px solid ${C.border}`,padding:"0 36px",display:"flex",justifyContent:"space-between",alignItems:"center",height:58}}>

              <span style={{fontFamily:T.serif,fontSize:21,letterSpacing:0.5}}>שמאות רכב</span>

            </div>

              <Btn onClick={()=>setShowProfile(true)} variant="secondary" small>⚙ פרטי שמאי</Btn>

              <Btn onClick={()=>setScreen("new")} variant="gold" small>+ שומה חדשה</Btn>

            ))}
          </div>

          <div style={{padding:"22px 36px",display:"flex",gap:28,borderBottom:`1px solid ${C.border}`}}>
            {[["שומות שנוצרו",reports.length],["אובדן להלכה",reports.filter(r=>r.reportType==="de-facto").length],["אובדן כללי",reports.filter(r=>r.reportType==="total").length]].map(([l,v])=>(
              <div key={l} style={{paddingLeft:24,borderLeft:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.textMuted,marginBottom:5}}>{l}</div>
                <div style={{fontSize:22,fontFamily:T.serif,fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{padding:"24px 36px"}}>
            {reports.length>0&&<h2 style={{margin:"0 0 16px",fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.textMuted}}>שומות אחרונות</h2>}
            {reports.slice(0,8).map(r=>{
              const tp=(r.parts||[]).reduce((s,p)=>s+(Number(p.price)||0),0);
              const tl=(r.laborItems||[]).reduce((s,l)=>s+(Number(l.hours)||0)*LABOR_RATE,0);
              const tot=(tp+tl)*(1+VAT);
              const type=REPORT_TYPES.find(t=>t.id===r.reportType);
              return (
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <div style={{width:2,height:32,background:type?.color||C.border}}/>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{r.ownerName}</div>
                      <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{r.carMake} {r.carModel} {r.carYear} | {r.licenseNum} | {new Date(r.createdAt).toLocaleDateString("he-IL")}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:15,fontFamily:T.serif,fontWeight:700}}>{tot.toLocaleString("he-IL",{maximumFractionDigits:0})} ₪</div>
                      <div style={{fontSize:9,color:C.textMuted,textAlign:"center"}}>כולל מע"מ</div>
                    </div>
                    <Btn onClick={()=>setPrintRep(r)} variant="secondary" small>הדפסה</Btn>
                    <Btn onClick={()=>{if(window.confirm("למחוק שומה זו?")){deleteReport(r.id);setReports(loadReports());}}} variant="danger" small>מחק</Btn>
                  </div>
                </div>
              );
            })}
            {!profile&&(
              <div style={{marginTop:20,padding:"16px 20px",border:`1px solid ${C.gold}44`,background:`${C.gold}08`}}>
                <span style={{color:C.gold,fontSize:13}}>⚠ טרם הגדרת פרטי שמאי — </span>
                <span style={{color:C.gold,cursor:"pointer",textDecoration:"underline",fontSize:13}} onClick={()=>setShowProfile(true)}>הגדר עכשיו</span>
              </div>
            )}
          </div>
          {showProfile&&<ProfileModal profile={profile} onSave={p=>{setProfile(p);saveProfile(p);setShowProfile(false);}} onClose={()=>setShowProfile(false)}/>}
        </div>
      );

      // ── LIST ──────────────────────────────────────────────
      if(screen==="list") return (
        <div dir="rtl" style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:T.sans,padding:36}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
            <h1 style={{margin:0,fontFamily:T.serif,fontSize:26}}>כל השומות</h1>
            <Btn onClick={()=>setScreen("home")} variant="secondary">← חזרה</Btn>
          </div>
          {reports.length===0&&<p style={{color:C.textMuted}}>אין שומות שמורות עדיין.</p>}
          {reports.map(r=>{
            const tp=(r.parts||[]).reduce((s,p)=>s+(Number(p.price)||0),0);
            const tl=(r.laborItems||[]).reduce((s,l)=>s+(Number(l.hours)||0)*LABOR_RATE,0);
            const tot=(tp+tl)*(1+VAT);
            return (
              <div key={r.id} style={{padding:"18px 22px",marginBottom:1,background:C.surface,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:14,alignItems:"center"}}>
                  <div style={{fontFamily:T.serif,fontSize:15,fontWeight:700}}>{r.ownerName}</div>
                  <div style={{fontSize:12,color:C.textMuted}}>{r.carMake} {r.carModel} {r.carYear} | {r.licenseNum}</div>
                  <Badge type={r.reportType}/>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{fontFamily:T.serif,fontSize:16,fontWeight:700,marginLeft:6}}>{tot.toLocaleString("he-IL",{maximumFractionDigits:0})} ₪</div>
                  <Btn onClick={()=>setPrintRep(r)} variant="gold" small>הדפס</Btn>
                  <Btn onClick={()=>{if(window.confirm("למחוק?")){deleteReport(r.id);setReports(loadReports());}}} variant="danger" small>מחק</Btn>
                </div>
              </div>
            );
          })}
        </div>
      );

      // ── NEW REPORT ────────────────────────────────────────
      return (
        <div dir="rtl" style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg,color:C.text,fontFamily:T.sans}}>
          {/* TOP BAR */}
          <div style={{borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",justifyContent:"space-between",alignItems:"center",height:54,flexShrink:0,background:C.surface}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Btn onClick={()=>{setScreen("home");setFormState(emptyForm());setParts([]);setLaborItems([{description:"",type:"bodywork",zone:"",hours:"2"}]);}} variant="secondary" small>← חזרה</Btn>
              <span style={{color:C.textMuted,fontSize:12}}>תיק <span style={{color:C.text,fontFamily:T.serif}}>{form.caseNumber}</span></span>
            </div>
            <div style={{display:"flex",gap:14,alignItems:"center",minWidth:320}}>
              {dmgPct>0&&<div style={{flex:1}}><DamageGauge percent={dmgPct}/></div>}
              <span style={{fontFamily:T.serif,fontSize:17,whiteSpace:"nowrap"}}>{total.toLocaleString("he-IL",{maximumFractionDigits:0})} ₪</span>
              <Btn onClick={doSave} variant="gold">שמור</Btn>
            </div>
          </div>

          <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",overflow:"hidden"}}>

            {/* ── LEFT: FORM ── */}
            <div style={{overflowY:"auto",padding:"22px 26px",borderLeft:`1px solid ${C.border}`}}>

              {/* Report type */}
              <div style={{marginBottom:24}}>
                <SecHead title="סוג חוות הדעת"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                  {REPORT_TYPES.map(t=>(
                    <div key={t.id} onClick={()=>setF("reportType",t.id)}
                      style={{padding:"13px 11px",cursor:"pointer",border:`1px solid ${form.reportType===t.id?t.color:C.border}`,background:form.reportType===t.id?`${t.color}12`:C.card,transition:"all 0.15s"}}>
                      <div style={{fontSize:15,marginBottom:4}}>{t.icon}</div>
                      <div style={{fontSize:11,fontWeight:700,color:form.reportType===t.id?t.color:C.text}}>{t.label}</div>
                      <div style={{fontSize:9,color:C.textMuted,marginTop:2,lineHeight:1.4}}>{t.desc}</div>
                    </div>
                  ))}
                </div>
                {dmgPct>0&&suggestedType!==form.reportType&&(
                  <div style={{marginTop:8,padding:"7px 11px",background:`${C.gold}12`,border:`1px solid ${C.gold}44`,fontSize:11,color:C.gold}}>
                    💡 לפי החישוב ({dmgPct.toFixed(1)}%) מוצע: <b>{REPORT_TYPES.find(t=>t.id===suggestedType)?.label}</b>
                  </div>
                )}
              </div>
              <Divider gold={true}/>

              {/* Case */}
              <div style={{marginBottom:22}}>
                <SecHead title="פרטי התיק"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <Inp label="מספר תיק" value={form.caseNumber} onChange={v=>setF("caseNumber",v)}/>
                  <Inp label="סוג נזק" value={form.damageType} onChange={v=>setF("damageType",v)} options={["תאונה","גניבה","שיטפון","שריפה","ברד","וונדליזם","אחר"]}/>
                  <Inp label="תאריך אירוע" value={form.incidentDate} onChange={v=>setF("incidentDate",v)} type="date"/>
                  <Inp label="תאריך בדיקה" value={form.inspectionDate} onChange={v=>setF("inspectionDate",v)} type="date"/>
                  <Inp label="מוסך / מקום בדיקה" value={form.garage} onChange={v=>setF("garage",v)} span={2}/>
                </div>
              </div>

              {/* Vehicle */}
              <div style={{marginBottom:22}}>
                <SecHead title="פרטי הרכב"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <Inp label="שם בעל הרכב" value={form.ownerName} onChange={v=>setF("ownerName",v)}/>
                  <Inp label="מספר רישוי" value={form.licenseNum} onChange={v=>setF("licenseNum",v)}/>
                  <Inp label="יצרן" value={form.carMake} onChange={v=>setF("carMake",v)}/>
                  <Inp label="דגם" value={form.carModel} onChange={v=>setF("carModel",v)}/>
                  <Inp label="שנת ייצור" value={form.carYear} onChange={v=>setF("carYear",v)}/>
                  <Inp label="מספר שילדה (VIN)" value={form.vin} onChange={v=>setF("vin",v)}/>
                  <Inp label='קילומטרים' value={form.km} onChange={v=>setF("km",v)} type="number"/>
                  <Inp label="מספר בעלים" value={form.owners} onChange={v=>setF("owners",v)} type="number"/>
                </div>
              </div>

              {/* Insurance */}
              <div style={{marginBottom:22}}>
                <SecHead title="פרטי ביטוח"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <Inp label="חברת ביטוח" value={form.insurance} onChange={v=>setF("insurance",v)}/>
                  <Inp label="מספר פוליסה" value={form.policyNum} onChange={v=>setF("policyNum",v)}/>
                  <Inp label="מספר תביעה" value={form.claimNum} onChange={v=>setF("claimNum",v)} span={2}/>
                </div>
              </div>

              {/* Vehicle Value */}
              <div style={{marginBottom:22}}>
                <SecHead title="תחשיב ערך הרכב" sub='לפי מחירון מקובל + התאמות (ערך כולל מע"מ 17%)'/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <Inp label="ערך בסיס לפי מחירון (₪)" value={form.baseValue} onChange={v=>setF("baseValue",v)} type="number"/>
                  <Inp label='תוספת/הפחתה ק"מ (₪)' value={form.kmAdj} onChange={v=>setF("kmAdj",v)} type="number"/>
                  <Inp label="תוספת/הפחתה בעלויות (₪)" value={form.ownersAdj} onChange={v=>setF("ownersAdj",v)} type="number"/>
                  <Inp label="תוספות ואביזרים (₪)" value={form.extras} onChange={v=>setF("extras",v)} type="number"/>
                  <Inp label="ערך רכב משוערך (₪)" value={Number(form.vehicleValue||0).toLocaleString()} onChange={()=>{}} readOnly/>
                  {(form.reportType==="de-facto"||form.reportType==="total")&&
                    <Inp label="ערך שרידים (₪)" value={form.salvageValue} onChange={v=>setF("salvageValue",v)} type="number"/>}
                </div>
              </div>

              {/* Descriptions */}
              <div style={{marginBottom:22,display:"flex",flexDirection:"column",gap:11}}>
                <SecHead title="תיאורים מקצועיים"/>
                <TA label="תיאור המקרה" value={form.incidentDesc} onChange={v=>setF("incidentDesc",v)} rows={3}/>
                <TA label="תיאור הנזקים" value={form.description} onChange={v=>setF("description",v)} rows={3}/>
                <TA label="הערות מקצועיות (הפחתות, חלפים תחליפיים, הסתייגויות)" value={form.notes} onChange={v=>setF("notes",v)} rows={2}/>
              </div>

              {/* Labor */}
              <div style={{marginBottom:22}}>
                <SecHead title="עבודות" sub={`תעריף שעתי: ${LABOR_RATE} ₪/ש"ע`}/>
                {laborItems.map((l,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 0.7fr auto",gap:8,marginBottom:7}}>
                    <Inp label={i===0?"תיאור עבודה":""} value={l.description} onChange={v=>setLaborItems(prev=>prev.map((x,j)=>j===i?{...x,description:v}:x))}/>
                    <Inp label={i===0?"סוג":""} value={l.type} onChange={v=>setLaborItems(prev=>prev.map((x,j)=>j===i?{...x,type:v}:x))} options={LABOR_TYPES.map(lt=>({v:lt.id,l:lt.label}))}/>
                    <Inp label={i===0?'ש"ע':""} value={l.hours} onChange={v=>setLaborItems(prev=>prev.map((x,j)=>j===i?{...x,hours:v}:x))} type="number"/>
                    <div style={{display:"flex",alignItems:i===0?"flex-end":"center"}}>
                      <button onClick={()=>setLaborItems(prev=>prev.filter((_,j)=>j!==i))}
                        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textMuted,cursor:"pointer",padding:"8px 10px",marginTop:i===0?22:0}}>✕</button>
                    </div>
                  </div>
                ))}
                <Btn onClick={()=>setLaborItems(prev=>[...prev,{description:"",type:"bodywork",zone:"",hours:"1"}])} variant="secondary" small>+ הוסף עבודה</Btn>
              </div>

              {/* Paint & Other */}
              <div style={{marginBottom:22}}>
                <SecHead title="צביעה ועלויות נוספות"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <Inp label="עלות צביעה (₪)" value={form.paintCost} onChange={v=>setF("paintCost",v)} type="number"/>
                  <Inp label="עלויות נוספות (₪)" value={form.otherCost} onChange={v=>setF("otherCost",v)} type="number"/>
                </div>
              </div>

            </div>

            {/* ── RIGHT: DIAGRAM + PARTS ── */}
            <div style={{overflowY:"auto",display:"flex",flexDirection:"column"}}>

              {/* Sticky summary */}
              <div style={{padding:"14px 22px",borderBottom:`1px solid ${C.border}`,background:C.surface,position:"sticky",top:0,zIndex:10}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:11}}>
                  {[["חלקים",totalParts],["עבודות",totalLabor],["צביעה",paint],['סה"כ+מע"מ',total]].map(([l,v])=>(
                    <div key={l} style={{textAlign:"center",padding:"9px 0",background:C.card,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,letterSpacing:1.2,textTransform:"uppercase",color:C.textMuted,marginBottom:3}}>{l}</div>
                      <div style={{fontFamily:T.serif,fontSize:13,fontWeight:700}}>{Number(v).toLocaleString("he-IL",{maximumFractionDigits:0})} ₪</div>
                    </div>
                  ))}
                </div>
                <DamageGauge percent={dmgPct}/>
              </div>

              {/* Tabs */}
              <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
                {[["diagram","סכמת הרכב"],["parts","רשימת חלקים"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setTabRight(k)} style={{flex:1,padding:"11px 0",border:"none",cursor:"pointer",background:tabRight===k?C.surface:"transparent",color:tabRight===k?C.text:C.textMuted,borderBottom:tabRight===k?`2px solid ${C.gold}`:"2px solid transparent",fontSize:11,letterSpacing:1,textTransform:"uppercase",fontFamily:T.sans,transition:"all 0.15s"}}>
                    {l}{k==="parts"&&parts.length>0?` (${parts.length})`:""}
                  </button>
                ))}
              </div>

              {/* Diagram tab */}
              {tabRight==="diagram"&&(
                <div style={{padding:"18px 22px",flex:1,overflowY:"auto"}}>
                  <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:16}}>
                    <CarMap activeZone={activeZone} onZone={setActiveZone} damaged={damaged}/>
                    <div style={{flex:1}}>
                      <p style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:C.textMuted,marginBottom:10}}>בחר מוקד פגיעה</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {DAMAGE_ZONES.map(z=>{
                          const cnt=parts.filter(p=>p.zone===z.id).length;
                          const active=activeZone===z.id, hit=damaged.includes(z.id);
                          return (
                            <button key={z.id} onClick={()=>setActiveZone(z.id)} style={{padding:"4px 9px",fontSize:10,cursor:"pointer",fontFamily:T.sans,background:active?C.gold:hit?"#dc262618":"transparent",color:active?"#000":hit?"#f87171":C.textMuted,border:`1px solid ${active?C.gold:hit?"#dc262644":C.border}`,transition:"all 0.15s"}}>
                              {z.label}{cnt>0?` (${cnt})`:""}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  <Divider gold={true}/>
                  <p style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.gold,marginBottom:12}}>
                    חלקים — {DAMAGE_ZONES.find(z=>z.id===activeZone)?.label}
                  </p>
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    {(PARTS_DB[activeZone]||[]).map((part,i)=>{
                      const sel=parts.find(p=>p.name===part.n&&p.zone===activeZone);
                      return (
                        <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",background:sel?`${C.gold}0d`:C.card,border:`1px solid ${sel?C.gold+"44":C.border}`,cursor:"pointer",transition:"all 0.15s"}}
                          onClick={()=>togglePart(part,activeZone)}>
                          <div style={{width:13,height:13,border:`1px solid ${sel?C.gold:C.border}`,background:sel?C.gold:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {sel&&<span style={{color:"#000",fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{flex:1,fontSize:12,color:sel?C.text:C.textMuted}}>{part.n}</span>
                          <span style={{fontSize:11,color:C.textMuted}}>{part.p.toLocaleString()} ₪</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Parts tab */}
              {tabRight==="parts"&&(
                <div style={{padding:"18px 22px",flex:1,overflowY:"auto"}}>
                  {parts.length===0?(
                    <div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>
                      <div style={{fontSize:28,marginBottom:10}}>○</div>
                      <p style={{fontSize:12,lineHeight:1.6}}>לא נבחרו חלקים עדיין.<br/>עבור לטאב "סכמת הרכב" ובחר חלקים.</p>
                    </div>
                  ):(
                    <div>
                      <p style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",color:C.textMuted,marginBottom:12}}>חלקים שנבחרו ({parts.length})</p>
                      {parts.map((p,i)=>(
                        <div key={i} style={{padding:"11px 13px",marginBottom:5,background:C.card,border:`1px solid ${C.border}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                            <div>
                              <span style={{fontSize:12,fontWeight:600}}>{p.name}</span>
                              <span style={{fontSize:10,color:C.textMuted,marginRight:7}}>{DAMAGE_ZONES.find(z=>z.id===p.zone)?.label}</span>
                            </div>
                            <button onClick={()=>setParts(prev=>prev.filter((_,j)=>j!==i))} style={{background:"transparent",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14}}>✕</button>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7}}>
                            {[["פעולה",["הח'","תק'","פו'"],"action"],["מקוריות",["תחליפי","מקורי","משומש","תואם"],"origin"]].map(([label,opts,key])=>(
                              <div key={key}>
                                <div style={{fontSize:9,color:C.textMuted,marginBottom:3,letterSpacing:1}}>{label}</div>
                                <select value={p[key]} onChange={e=>updatePart(i,key,e.target.value)}
                                  style={{width:"100%",padding:"5px 7px",background:C.bg,color:C.text,border:`1px solid ${C.border}`,fontSize:11,fontFamily:T.sans}}>
                                  {opts.map(o=><option key={o}>{o}</option>)}
                                </select>
                              </div>
                            ))}
                            <div>
                              <div style={{fontSize:9,color:C.textMuted,marginBottom:3,letterSpacing:1}}>בלאי %</div>
                              <input type="number" value={p.wear||""} placeholder="0" onChange={e=>updatePart(i,"wear",e.target.value)}
                                style={{width:"100%",padding:"5px 7px",background:C.bg,color:C.text,border:`1px solid ${C.border}`,fontSize:11,fontFamily:T.sans}}/>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:C.textMuted,marginBottom:3,letterSpacing:1}}>מחיר ₪</div>
                              <input type="number" value={p.price} onChange={e=>updatePart(i,"price",Number(e.target.value))}
                                style={{width:"100%",padding:"5px 7px",background:C.bg,color:C.gold,border:`1px solid ${C.border}`,fontSize:12,fontFamily:T.sans,fontWeight:700}}/>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
